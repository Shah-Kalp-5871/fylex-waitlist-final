version: '3.8'

services:
  web:
    build: .
    container_name: fylex-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/fylex?replicaSet=rs0
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:7.0
    container_name: fylex-mongodb
    restart: always
    ports:
      - 27017:27017
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "try { rs.status() } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }"]
      interval: 10s
      start_period: 5s
      retries: 3

volumes:
  mongodb_data:
